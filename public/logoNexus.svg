<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600">
  <defs>
    <linearGradient id="grad" x1="90" y1="55" x2="510" y2="310" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#0f172a"/>
      <stop offset="42%"  stop-color="#1d4ed8"/>
      <stop offset="100%" stop-color="#60a5fa"/>
    </linearGradient>
    <filter id="glow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#1d4ed8" flood-opacity="0.18"/>
    </filter>
  </defs>

  <rect width="600" height="600" fill="white"/>

  <g filter="url(#glow)">
    <!-- N · left vertical bar -->
    <rect x="90"  y="55" width="36" height="255" fill="url(#grad)"/>
    <!-- N · diagonal stroke -->
    <polygon points="126,55 162,55 288,310 252,310" fill="url(#grad)"/>
    <!-- N · right bar / F · left bar (shared) -->
    <rect x="288" y="55" width="36" height="255" fill="url(#grad)"/>
    <!-- F · top arm -->
    <polygon points="324,55 508,55 488,93 324,93" fill="url(#grad)"/>
    <!-- F · middle arm -->
    <polygon points="324,168 456,168 437,206 324,206" fill="url(#grad)"/>
  </g>

  <text x="300" y="400" text-anchor="middle"
        font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif"
        font-size="70" font-weight="800" letter-spacing="-1">
    <tspan fill="#0f172a">Nexus</tspan><tspan fill="#1d4ed8">Fac</tspan>
  </text>

  <text x="300" y="440" text-anchor="middle"
        font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif"
        font-size="14" fill="#94a3b8" letter-spacing="4" font-weight="500">
    SISTEMA DE FACTURACIÓN ELECTRÓNICA
  </text>

  <line x1="158" y1="462" x2="286" y2="462" stroke="#e2e8f0" stroke-width="1.5"/>
  <circle cx="300" cy="462" r="3.5" fill="#1d4ed8"/>
  <line x1="314" y1="462" x2="442" y2="462" stroke="#e2e8f0" stroke-width="1.5"/>
</svg>
